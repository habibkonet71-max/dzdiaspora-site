<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — DZ Diaspora</title>
  <meta name="description" content="Connectez-vous ou inscrivez-vous pour deposer des annonces sur DZ Diaspora.">
  <link rel="canonical" href="https://habibkonet71-max.github.io/dzdiaspora-site/connexion.html">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container { max-width: 420px; margin: 40px auto; }
    .auth-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .auth-tab {
      flex: 1;
      background: #1C2333;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .auth-tab.active { background: #4DD0E1; color: #0D1117; font-weight: bold; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: rgba(255,255,255,0.7); }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      background: #0D1117;
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 14px;
    }
    .msg-erreur { background: rgba(214,16,52,0.15); border: 1px solid rgba(214,16,52,0.5); color: #ff6b6b; padding: 12px; border-radius: 8px; margin-bottom: 16px; display: none; font-size: 13px; }
    .msg-succes { background: rgba(167,255,167,0.1); border: 1px solid rgba(167,255,167,0.4); color: #A8E063; padding: 12px; border-radius: 8px; margin-bottom: 16px; display: none; font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">DZ Diaspora</a>
    <nav class="nav-desktop">
      <a href="securite.html">Securite</a>
      <a href="sante.html">Sante</a>
      <a href="finance.html">Finance</a>
      <a href="annonces.html">Annonces</a>
      <a href="transport.html">Transport</a>
    </nav>
    <div class="lang-btns">
      <button class="lang-btn active notranslate" data-lang="fr" onclick="changerLangueSite('fr')">FR</button>
      <button class="lang-btn notranslate" data-lang="en" onclick="changerLangueSite('en')">EN</button>
      <button class="lang-btn notranslate" data-lang="zh" onclick="changerLangueSite('zh')">中文</button>
    </div>
    <button class="menu-btn" id="menuBtn">⋮</button>
  </header>

  <div class="menu-dropdown" id="menuDropdown">
    <a href="securite.html">Securite</a>
    <a href="sante.html">Sante</a>
    <a href="finance.html">Finance</a>
    <a href="justice.html">Justice</a>
    <a href="immobilier.html">Immobilier</a>
    <a href="administratif.html">Administratif</a>
    <a href="wilayas.html">Wilayas</a>
    <a href="transport.html">Transport</a>
    <a href="annonces.html">Annonces</a>
    <a href="abonnement.html">Devenir Pro</a>
    <a href="contact.html">Contact</a>
    <a href="cgu.html">CGU et mentions legales</a>
  </div>

  <main class="page-content">
    <div class="auth-container">
      <h1 style="text-align: center; margin-bottom: 20px;">🔐 Mon compte</h1>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabConnexion" onclick="afficherFormulaire('connexion')">Connexion</button>
        <button class="auth-tab" id="tabInscription" onclick="afficherFormulaire('inscription')">Inscription</button>
      </div>

      <div class="msg-erreur" id="msgErreur"></div>
      <div class="msg-succes" id="msgSucces"></div>

      <form id="formConnexion">
        <div class="form-group"><label>Email</label><input type="email" id="emailConnexion" required></div>
        <div class="form-group"><label>Mot de passe</label><input type="password" id="passwordConnexion" required></div>
        <button type="submit" class="btn-telecharger" style="width: 100%; padding: 12px;">Se connecter</button>
      </form>

      <form id="formInscription" style="display: none;">
        <div class="form-group"><label>Email</label><input type="email" id="emailInscription" required></div>
        <div class="form-group"><label>Mot de passe (6 caracteres minimum)</label><input type="password" id="passwordInscription" required minlength="6"></div>
        <button type="submit" class="btn-telecharger" style="width: 100%; padding: 12px;">S inscrire</button>
      </form>

      <p style="text-align: center; margin-top: 16px; font-size: 12px; color: rgba(255,255,255,0.4);">
        En vous inscrivant, vous acceptez nos <a href="cgu.html" style="color: #4DD0E1;">CGU</a>.
      </p>
    </div>
  </main>

  <footer>
    <p>DZ Diaspora — Tous droits reserves</p>
    <p><a href="cgu.html">CGU</a> · <a href="contact.html">Contact</a></p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      sendEmailVerification,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDdOF-MYm0nTq0aNG6pk-wQLaYujiNuMWQ",
      appId: "1:223003656315:web:100de190b8b5e74ddae2de",
      messagingSenderId: "223003656315",
      projectId: "dzdiaspora-7260a",
      authDomain: "dzdiaspora-7260a.firebaseapp.com",
      storageBucket: "dzdiaspora-7260a.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.afficherFormulaire = function (type) {
      document.getElementById("tabConnexion").classList.toggle("active", type === "connexion");
      document.getElementById("tabInscription").classList.toggle("active", type === "inscription");
      document.getElementById("formConnexion").style.display = type === "connexion" ? "block" : "none";
      document.getElementById("formInscription").style.display = type === "inscription" ? "block" : "none";
      document.getElementById("msgErreur").style.display = "none";
      document.getElementById("msgSucces").style.display = "none";
    };

    document.getElementById("formInscription").addEventListener("submit", async function (e) {
      e.preventDefault();
      const msgErreur = document.getElementById("msgErreur");
      const msgSucces = document.getElementById("msgSucces");
      msgErreur.style.display = "none";

      const email = document.getElementById("emailInscription").value;
      const password = document.getElementById("passwordInscription").value;

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await sendEmailVerification(cred.user);
        msgSucces.textContent = "✅ Inscription reussie ! Un email de verification vous a ete envoye — verifiez votre boite de reception.";
        msgSucces.style.display = "block";
      } catch (err) {
        msgErreur.textContent = "❌ " + traduireErreur(err.code);
        msgErreur.style.display = "block";
      }
    });

    document.getElementById("formConnexion").addEventListener("submit", async function (e) {
      e.preventDefault();
      const msgErreur = document.getElementById("msgErreur");
      msgErreur.style.display = "none";

      const email = document.getElementById("emailConnexion").value;
      const password = document.getElementById("passwordConnexion").value;

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        if (!cred.user.emailVerified) {
          msgErreur.textContent = "⚠️ Veuillez verifier votre email avant de continuer (lien envoye lors de l inscription).";
          msgErreur.style.display = "block";
          return;
        }
        window.location.href = "deposer-annonce.html";
      } catch (err) {
        msgErreur.textContent = "❌ " + traduireErreur(err.code);
        msgErreur.style.display = "block";
      }
    });

    function traduireErreur(code) {
      const erreurs = {
        "auth/email-already-in-use": "Cet email est deja utilise.",
        "auth/invalid-email": "Email invalide.",
        "auth/weak-password": "Mot de passe trop faible (6 caracteres minimum).",
        "auth/user-not-found": "Aucun compte avec cet email.",
        "auth/wrong-password": "Mot de passe incorrect.",
        "auth/invalid-credential": "Email ou mot de passe incorrect."
      };
      return erreurs[code] || "Une erreur est survenue.";
    }
  </script>
  <script src="script.js"></script>
  <script src="traduction.js"></script>
</body>
</html>
