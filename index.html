<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DZ Diaspora</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0D1117;
      color: #FFFFFF;
      min-height: 100vh;
    }
    header {
      background: #1C2333;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    header h1 {
      font-size: 20px;
      font-weight: 700;
    }
    .lang-btns {
      display: flex;
      gap: 6px;
    }
    .lang-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      border-radius: 14px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .lang-btn.active {
      background: rgba(255,255,255,0.25);
      border-color: white;
      font-weight: bold;
    }
    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 12px;
    }
    .bandeau {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 10px 0;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
    }
    .bandeau span {
      white-space: nowrap;
    }
    .search-box {
      margin: 8px 0;
    }
    .search-box input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      background: #1C2333;
      color: white;
      font-size: 14px;
    }
    .search-box input::placeholder {
      color: rgba(255,255,255,0.35);
    }
    .tuiles {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .tuile {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
      font-size: 14px;
      color: white;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .tuile-urgence {
      background: #D21034;
    }
    .tuile-transport {
      background: #26C6DA;
    }
    .mosquees {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 10px;
    }
    .carte-mosquee {
      min-width: 150px;
      min-width: 150px;
      background: #1C2333;
      border: 1px solid rgba(167,255,167,0.25);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
    }
    .carte-mosquee .ville {
      font-weight: bold;
      margin-bottom: 4px;
    }
    .carte-mosquee .horaire {
      color: #A8E063;
      font-weight: bold;
    }
    .presse-article {
      background: #1C2333;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      margin-bottom: 12px;
      overflow: hidden;
      cursor: pointer;
    }
    .presse-article img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
    }
    .presse-article .contenu {
      padding: 14px;
    }
    .presse-article .source {
      display: inline-block;
      background: rgba(255,193,7,0.15);
      color: #FFC107;
      font-size: 10px;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .presse-article h3 {
      font-size: 15px;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .presse-article p {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      line-height: 1.4;
    }
    .presse-article .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }
    .chargement {
      text-align: center;
      padding: 40px 0;
      color: rgba(255,255,255,0.4);
    }
    footer {
      text-align: center;
      padding: 24px;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <h1>DZ Diaspora</h1>
    <div class="lang-btns">
      <button class="lang-btn active">FR</button>
      <button class="lang-btn">EN</button>
    </div>
  </header>

  <main>
    <div class="bandeau" id="bandeauMeteo">
      <span>Chargement meteo...</span>
    </div>

    <div class="search-box">
      <input type="text" id="rechercheInput" placeholder="Rechercher: sante, transport, wilaya, passeport...">
    </div>

    <div class="tuiles">
      <a href="tel:1548" class="tuile tuile-urgence">🚨 Urgences</a>
      <a href="#presse" class="tuile tuile-transport">✈️ Transport</a>
    </div>

    <div class="mosquees" id="mosqueesContainer">
      <div class="carte-mosquee">Chargement mosquees...</div>
    </div>

    <div id="presseContainer">
      <div class="chargement">Chargement des actualites...</div>
    </div>
  </main>

  <footer>
    DZ Diaspora — Tous droits reserves
  </footer>

  <script>
    async function chargerMeteo() {
      try {
        const villes = [
          { nom: "Alger", lat: 36.7538, lon: 3.0588 },
          { nom: "Oran", lat: 35.6969, lon: -0.6331 },
          { nom: "Constantine", lat: 36.365, lon: 6.6147 }
        ];
        const bandeau = document.getElementById("bandeauMeteo");
        bandeau.innerHTML = "";
        for (const ville of villes) {
          const reponse = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${ville.lat}&longitude=${ville.lon}&current_weather=true`);
          const data = await reponse.json();
          const temp = data.current_weather?.temperature;
          const span = document.createElement("span");
          span.textContent = `${ville.nom}: ${temp}°C`;
          bandeau.appendChild(span);
        }
      } catch (e) {
        document.getElementById("bandeauMeteo").innerHTML = "<span>Meteo indisponible</span>";
      }
    }

    async function chargerMosquees() {
      const mosquees = [
        { ville: "Alger", lat: 36.7194, lon: 3.1547 },
        { ville: "Constantine", lat: 36.3650, lon: 6.6147 },
        { ville: "Oran", lat: 35.6969, lon: -0.6331 }
      ];
      const container = document.getElementById("mosqueesContainer");
      container.innerHTML = "";
      for (const m of mosquees) {
        try {
          const reponse = await fetch(`https://api.aladhan.com/v1/timings?latitude=${m.lat}&longitude=${m.lon}&method=19`);
          const data = await reponse.json();
          const timings = data.data?.timings;
          const maintenant = new Date();
          const ordre = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
          let prochaine = "Fajr";
          let heure = timings?.Fajr || "";
          for (const p of ordre) {
            const [h, mn] = (timings[p] || "00:00").split(":");
            const dt = new Date();
            dt.setHours(parseInt(h), parseInt(mn), 0);
            if (dt > maintenant) {
              prochaine = p;
              heure = timings[p];
              break;
            }
          }
          const carte = document.createElement("div");
          carte.className = "carte-mosquee";
          carte.innerHTML = `<div class="ville">🕌 ${m.ville}</div><div class="horaire">${prochaine} : ${heure}</div>`;
          carte.onclick = () => window.open(`https://www.google.com/maps/search/?api=1&query=${m.lat},${m.lon}`, "_blank");
          container.appendChild(carte);
        } catch (e) {
        }
      }
    }

    async function chargerPresse() {
      const container = document.getElementById("presseContainer");
      try {
        const sources = [
          { nom: "TSA", url: "https://www.tsa-algerie.com/feed/" },
          { nom: "El Watan", url: "https://www.elwatan.com/feed" }
        ];
        const proxy = "https://api.allorigins.win/raw?url=";
        let articlesHtml = "";

        for (const source of sources) {
          try {
            const reponse = await fetch(proxy + encodeURIComponent(source.url));
            const texte = await reponse.text();
            const parser = new DOMParser();
            const xml = parser.parseFromString(texte, "text/xml");
            const items = xml.querySelectorAll("item");

            items.forEach((item, index) => {
              if (index >= 5) return;
              const titre = item.querySelector("title")?.textContent || "";
              const lien = item.querySelector("link")?.textContent || "";
              const desc = (item.querySelector("description")?.textContent || "").replace(/<[^>]*>/g, "").substring(0, 120);

              articlesHtml += `
                <div class="presse-article" onclick="window.open('${lien}', '_blank')">
                  <div class="contenu">
                    <span class="source">${source.nom}</span>
                    <h3>${titre}</h3>
                    <p>${desc}...</p>
                    <div class="meta">
                      <span>Lire l'article</span>
                    </div>
                  </div>
                </div>
              `;
            });
          } catch (e) {
          }
        }

        container.innerHTML = articlesHtml || "<div class=\"chargement\">Aucun article disponible</div>";
      } catch (e) {
        container.innerHTML = "<div class=\"chargement\">Erreur de chargement</div>";
      }
    }

    document.getElementById("rechercheInput").addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        const requete = encodeURIComponent(this.value + " Algerie diaspora");
        window.open(`https://www.google.com/search?q=${requete}`, "_blank");
      }
    });

    chargerMeteo();
    chargerMosquees();
    chargerPresse();
  </script>
</body>
</html>
