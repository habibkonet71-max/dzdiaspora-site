<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DZ Diaspora</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0D1117;
      color: #FFFFFF;
      min-height: 100vh;
    }
    header {
      background: #1C2333;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    header h1 { font-size: 20px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .menu-btn {
      background: none;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px;
    }
    .menu-dropdown {
      position: absolute;
      top: 56px;
      right: 24px;
      background: #1C2333;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      min-width: 220px;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 30;
    }
    .menu-dropdown.open { display: block; }
    .menu-dropdown a {
      display: block;
      padding: 12px 16px;
      color: white;
      text-decoration: none;
      font-size: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
    }
    .menu-dropdown a:last-child { border-bottom: none; }
    .menu-dropdown a:hover { background: rgba(255,255,255,0.06); }
    .lang-btns { display: flex; gap: 6px; }
    .lang-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      border-radius: 14px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .lang-btn.active { background: rgba(255,255,255,0.25); border-color: white; font-weight: bold; }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .bandeaux-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      padding: 10px 0;
    }
    .bandeau {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      flex: 1;
      min-width: 280px;
    }
    .bandeau span { white-space: nowrap; }
    .search-box { margin: 10px 0; }
    .search-box input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: none;
      background: #1C2333;
      color: white;
      font-size: 15px;
    }
    .search-box input::placeholder { color: rgba(255,255,255,0.35); }
    .tuiles { display: flex; gap: 12px; margin-bottom: 14px; }
    .tuile {
      flex: 1;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
      font-size: 15px;
      color: white;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .tuile-urgence { background: #D21034; }
    .tuile-transport { background: #26C6DA; }
    .mosquees { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 12px; }
    .carte-mosquee {
      min-width: 160px;
      background: #1C2333;
      border: 1px solid rgba(167,255,167,0.25);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .carte-mosquee .ville { font-weight: bold; margin-bottom: 4px; }
    .carte-mosquee .horaire { color: #A8E063; font-weight: bold; }
    .presse-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .presse-article {
      background: #1C2333;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
    }
    .presse-article .contenu { padding: 14px; }
    .presse-article .source {
      display: inline-block;
      background: rgba(255,193,7,0.15);
      color: #FFC107;
      font-size: 10px;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .presse-article h3 { font-size: 15px; margin-bottom: 6px; line-height: 1.3; }
    .presse-article p { color: rgba(255,255,255,0.6); font-size: 13px; line-height: 1.4; }
    .chargement { text-align: center; padding: 40px 0; color: rgba(255,255,255,0.4); grid-column: 1/-1; }
    footer { text-align: center; padding: 24px; color: rgba(255,255,255,0.3); font-size: 12px; }
    @media (max-width: 700px) {
      .bandeaux-row { flex-direction: column; gap: 4px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>DZ Diaspora</h1>
    <div class="header-right">
      <div class="lang-btns">
        <button class="lang-btn active notranslate" data-lang="fr" onclick="changerLangueSite('fr')">FR</button>
        <button class="lang-btn notranslate" data-lang="en" onclick="changerLangueSite('en')">EN</button>
        <button class="lang-btn notranslate" data-lang="zh" onclick="changerLangueSite('zh')">中文</button>
      </div>
      <button class="menu-btn" id="menuBtn">⋮</button>
    </div>
  </header>

  <div class="menu-dropdown" id="menuDropdown">
    <a id="menuSecurite">Securite</a>
    <a id="menuSante">Sante</a>
    <a id="menuFinance">Finance</a>
    <a id="menuAdministratif">Administratif</a>
    <a id="menuWilayas">Wilayas</a>
    <a href="#presse">Transport</a>
    <a href="mailto:contact@dzdiaspora-app.com">Contact</a>
    <a id="menuCgu">CGU et mentions legales</a>
  </div>

  <main>
    <div class="bandeaux-row">
      <div class="bandeau" id="bandeauMeteo"><span>Chargement meteo...</span></div>
      <div class="bandeau" id="bandeauDevises"><span>Chargement devises...</span></div>
    </div>

    <div class="search-box">
      <input type="text" id="rechercheInput" placeholder="Rechercher: sante, transport, wilaya, passeport...">
    </div>

    <div class="tuiles">
      <button class="tuile tuile-urgence" id="btnUrgences">🚨 Urgences</button>
      <a href="#presse" class="tuile tuile-transport">✈️ Transport</a>
    </div>

    <div class="mosquees" id="mosqueesContainer">
      <div class="carte-mosquee">Chargement mosquees...</div>
    </div>

    <div id="presse"></div>
    <div class="presse-grid" id="presseContainer">
      <div class="chargement">Chargement des actualites...</div>
    </div>
  </main>

  <footer>
    DZ Diaspora — Tous droits reserves
  </footer>

  <script>
    document.getElementById("menuBtn").addEventListener("click", function () {
      document.getElementById("menuDropdown").classList.toggle("open");
    });

    document.getElementById("btnUrgences").addEventListener("click", function () {
      alert("Police: 17\nPompiers: 18\nSAMU: 1548\nGendarmerie: 1055");
    });

    document.getElementById("menuSecurite").addEventListener("click", function () {
      alert("Securite: Police 17, Pompiers 18, SAMU 1548");
    });
    document.getElementById("menuSante").addEventListener("click", function () {
      alert("Sante: numeros et infos disponibles dans l app mobile");
    });
    document.getElementById("menuFinance").addEventListener("click", function () {
      alert("Finance: infos disponibles dans l app mobile");
    });
    document.getElementById("menuAdministratif").addEventListener("click", function () {
      alert("Administratif: passeport, consulats - app mobile");
    });
    document.getElementById("menuWilayas").addEventListener("click", function () {
      alert("Wilayas: liste complete disponible dans l app mobile");
    });
    document.getElementById("menuCgu").addEventListener("click", function () {
      alert("CGU et mentions legales: document disponible dans l app mobile");
    });

    function changerLangue(lang) {
      document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
      document.getElementById("btn" + lang).classList.add("active");
    }
    document.getElementById("btnFr").addEventListener("click", () => changerLangue("Fr"));
    document.getElementById("btnEn").addEventListener("click", () => changerLangue("En"));
    document.getElementById("btnZh").addEventListener("click", () => changerLangue("Zh"));

    async function chargerMeteo() {
      try {
        const villes = [
          { nom: "Alger", lat: 36.7538, lon: 3.0588 },
          { nom: "Oran", lat: 35.6969, lon: -0.6331 },
          { nom: "Constantine", lat: 36.365, lon: 6.6147 }
        ];
        const bandeau = document.getElementById("bandeauMeteo");
        bandeau.innerHTML = "";
        for (const ville of villes) {
          const reponse = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${ville.lat}&longitude=${ville.lon}&current_weather=true`);
          const data = await reponse.json();
          const temp = data.current_weather?.temperature;
          const span = document.createElement("span");
          span.textContent = `${ville.nom}: ${temp}°C`;
          bandeau.appendChild(span);
        }
      } catch (e) {
        document.getElementById("bandeauMeteo").innerHTML = "<span>Meteo indisponible</span>";
      }
    }

    async function chargerDevises() {
      try {
        const reponse = await fetch("https://api.exchangerate-api.com/v4/latest/EUR");
        const data = await reponse.json();
        const dzd = data.rates?.DZD;
        const usd = data.rates?.USD;
        const bandeau = document.getElementById("bandeauDevises");
        bandeau.innerHTML = `<span>1 EUR = ${dzd?.toFixed(2)} DZD</span><span>1 USD = ${(dzd/usd).toFixed(2)} DZD</span>`;
      } catch (e) {
        document.getElementById("bandeauDevises").innerHTML = "<span>Devises indisponibles</span>";
      }
    }

    async function chargerMosquees() {
      const mosquees = [
        { ville: "Alger", lat: 36.7194, lon: 3.1547 },
        { ville: "Constantine", lat: 36.3650, lon: 6.6147 },
        { ville: "Oran", lat: 35.6969, lon: -0.6331 }
      ];
      const container = document.getElementById("mosqueesContainer");
      container.innerHTML = "";
      for (const m of mosquees) {
        try {
          const reponse = await fetch(`https://api.aladhan.com/v1/timings?latitude=${m.lat}&longitude=${m.lon}&method=19`);
          const data = await reponse.json();
          const timings = data.data?.timings;
          const maintenant = new Date();
          const ordre = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
          let prochaine = "Fajr";
          let heure = timings?.Fajr || "";
          for (const p of ordre) {
            const [h, mn] = (timings[p] || "00:00").split(":");
            const dt = new Date();
            dt.setHours(parseInt(h), parseInt(mn), 0);
            if (dt > maintenant) {
              prochaine = p;
              heure = timings[p];
              break;
            }
          }
          const carte = document.createElement("div");
          carte.className = "carte-mosquee";
          carte.innerHTML = `<div class="ville">🕌 ${m.ville}</div><div class="horaire">${prochaine} : ${heure}</div>`;
          carte.onclick = () => window.open(`https://www.google.com/maps/search/?api=1&query=${m.lat},${m.lon}`, "_blank");
          container.appendChild(carte);
        } catch (e) {
        }
      }
    }

    async function chargerPresse() {
      const container = document.getElementById("presseContainer");
      try {
        const sources = [
          { nom: "TSA", url: "https://www.tsa-algerie.com/feed/" },
          { nom: "El Watan", url: "https://www.elwatan.com/feed" }
        ];
        const proxy = "https://api.rss2json.com/v1/api.json?rss_url=";
        let articlesHtml = "";

        for (const source of sources) {
          try {
            const reponse = await fetch(proxy + encodeURIComponent(source.url));
            const data = await reponse.json();

            if (data.status === "ok" && data.items) {
              data.items.slice(0, 6).forEach((item) => {
                const desc = (item.description || "").replace(/<[^>]*>/g, "").substring(0, 120);
                articlesHtml += `
                  <div class="presse-article" onclick="window.open('${item.link}', '_blank')">
                    <div class="contenu">
                      <span class="source">${source.nom}</span>
                      <h3>${item.title}</h3>
                      <p>${desc}...</p>
                    </div>
                  </div>
                `;
              });
            }
          } catch (e) {
          }
        }

        container.innerHTML = articlesHtml || "<div class=\"chargement\">Aucun article disponible</div>";
      } catch (e) {
        container.innerHTML = "<div class=\"chargement\">Erreur de chargement</div>";
      }
    }

    document.getElementById("rechercheInput").addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        const requete = encodeURIComponent(this.value + " Algerie diaspora");
        window.open(`https://www.google.com/search?q=${requete}`, "_blank");
      }
    });

    chargerMeteo();
    chargerDevises();
    chargerMosquees();
    chargerPresse();
  </script>
</body>
</html>
